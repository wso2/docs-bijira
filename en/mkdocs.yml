# Project information
site_name: "API Platform Documentation"
site_description: API Platform Documentation
site_author: WSO2
site_url: https://wso2.com/bijira/docs

# Repository
repo_name: wso2/docs-bijira
repo_url: https://github.com/wso2/docs-bijira
edit_uri: https://github.com/wso2/docs-bijira/edit/main/en/docs/
dev_addr: localhost:8000

# Copyright
copyright: ©2025 WSO2 LLC.

# Configuration
watch:
  - theme/
  - docs/assets/

theme:
  name: material
  custom_dir: theme/material
  logo: assets/images/APIPlatformDocs.svg
  logo_light: assets/images/APIPlatformDocsWhite.svg
  font:
    text: Montserrat
  favicon: assets/images/favicon.png
  features:
    - navigation.path
    - navigation.top
    - content.code.copy
    - content.action.edit
    - content.action.view
  language: "en"
  palette:
    # Palette toggle for light mode
       - media: "(prefers-color-scheme: light)"
         scheme: default 
         toggle:
          icon: assets/libs/oxygen-ui-icons/1.7.3/crescent-bright-16.svg
          name: Switch to dark mode
      # Palette toggle for dark mode
       - media: "(prefers-color-scheme: dark)"
         scheme: slate
         toggle:
           icon: assets/libs/oxygen-ui-icons/1.7.3/sun-16.svg
           name: Switch to light mode

  icon:
    logo: logo
#Breaks build if there's a warning
strict: false
# Navigation
nav:
  - API Manager: https://apim.docs.wso2.com/en/latest/
  - API Gateway:
    - Overview: api-gateway/overview.md
    - Setup:
      - Storage & Backends: api-gateway/setup/storage-and-backends.md
      - Immutable Gateway: api-gateway/setup/immutable-gateway.md
      - Artifact Templating: api-gateway/setup/artifact-templating.md 
      - Upstream Timeouts: api-gateway/setup/upstream-timeouts.md 
    - Quick Start Guide: api-gateway/quick-start-guide.md
    - Policies:
      - Overview: api-gateway/policies/overview.md
      - Custom Policies:
        - Writing a Custom Policy: api-gateway/policies/custom-policies/writing-a-custom-policy.md
        - Building Gateway with Custom Policies: api-gateway/policies/custom-policies/building-gateway-with-custom-policies.md
    - Deploying APIs:
      - Bottom-Up Deployment: api-gateway/deploying-apis/bottom-up-api-deployment.md 
      - Gateway Operator: api-gateway/deploying-apis/gateway-operator.md
    - Observability:
      - Logging: api-gateway/observability/logging.md
      - Tracing: api-gateway/observability/tracing.md
      - Metrics: api-gateway/observability/metrics.md
    - Analytics:
      - Analytics Header Filter: api-gateway/analytics/analytics-header-filter.md
      - Moesif Analytics: api-gateway/analytics/moesif-analytics.md
    - Management API:
      - Overview: api-gateway/gateway-controller-management-api/overview.md
      - Authentication: api-gateway/gateway-controller-management-api/authentication.md
      - Rest API Management: api-gateway/gateway-controller-management-api/rest-api-management.md
      - MCP Proxy Management: api-gateway/gateway-controller-management-api/mcp-proxy-management.md
      - Certificate Management: api-gateway/gateway-controller-management-api/certificate-management.md
      - LLM Provider Template Management: api-gateway/gateway-controller-management-api/llm-provider-template-management.md
      - LLM Provider Management: api-gateway/gateway-controller-management-api/llm-provider-management.md
      - LLM Proxy Management: api-gateway/gateway-controller-management-api/llm-proxy-management.md
      - Secrets Management: api-gateway/gateway-controller-management-api/secrets-management.md
      - WebSub API Management: api-gateway/gateway-controller-management-api/websub-api-management.md
      - Schemas: api-gateway/gateway-controller-management-api/schemas.md
  
# Extensions
markdown_extensions:
  - markdown.extensions.admonition
  - markdown.extensions.def_list
  - markdown.extensions.footnotes
  - markdown.extensions.toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.snippets:
      base_path: docs
  - attr_list
plugins:
  - search
  - include-markdown
  - glightbox
  - open-in-new-tab
  - markdownextradata: {}
extra_css:
  - assets/lib/highlightjs/default.min.css
  - assets/css/theme.css
  - assets/lib/json-formatter/json-formatter.css
extra_javascript:
  - assets/lib/json-formatter/json-formatter.umd.js
  - assets/lib/highlightjs/highlight.min.js
  - assets/js/theme.js
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/wso2
  expanded_navs:
    - title: Cloud
      options:
        - verticle-line
        - divider
    - title: MCP Servers
      options:
        - verticle-line-only
    - title: Monitor and Insights
      options:
        - verticle-line-only
    - title: API Monetization
      options:
        - verticle-line-only
    - title: Administer
      options:
        - verticle-line-only
    - title: Workflows
      options:
        - verticle-line-only
    - title: Developer Portal
      options:
        - verticle-line
        - divider
  nav_icons:
    Cloud:
      icon: octicons/cloud-16
      level: 1
    MCP Servers:
      icon: octicons/server-16
      level: 1
    AI Gateway:
      icon: octicons/cpu-16
      level: 1
    AI Workspace:
      icon: octicons/project-roadmap-16
      level: 1
    Event Gateway:
      icon: octicons/webhook-16
      level: 1
    API Gateway:
      icon: octicons/globe-16
      level: 1
    Monitor and Insights:
      icon: octicons/graph-16
      level: 1
    API Monetization:
      icon: octicons/credit-card-16
      level: 1
    Administer:
      icon: octicons/lock-16
      level: 1
    Workflows:
      icon: octicons/workflow-16
      level: 1
    Developer Portal:
      icon: octicons/book-16
      level: 1

